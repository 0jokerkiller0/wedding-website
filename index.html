<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

:root {
  --ink:    #1C0A04;
  --maroon: #6B1520;
  --gold:   #B8862A;
  --gold2:  #D4A84B;
  --cream:  #FBF4E8;
  --warm:   #F5EAD5;
  --blush:  #EDD5B8;
  --muted:  #96644A;
}

body { background:var(--cream); color:var(--ink); font-family:'Cormorant Garamond',serif; overflow-x:hidden; }

/* noise overlay \u2014 pointer-events none, above everything visual but below UI */
body::after {
  content:''; position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:9990; opacity:.35;
}

/* \u2500\u2500 PROGRESS BAR \u2500\u2500 */
#progress-bar {
  position:fixed; top:0; left:0; height:2px; width:0%;
  background:linear-gradient(90deg,var(--gold),#E07B39,var(--gold));
  z-index:10000; transition:width .12s linear;
  box-shadow:0 0 8px rgba(184,134,42,.7);
  pointer-events:none;
}

/* \u2500\u2500 PETALS \u2500\u2500 */
#petals { position:fixed; inset:0; pointer-events:none; z-index:9980; overflow:hidden; }
.p { position:absolute; top:-40px; animation:fall linear infinite; opacity:0; }
@keyframes fall {
  0%   { opacity:0;   transform:translateY(0)      rotate(0deg)   translateX(0); }
  6%   { opacity:.65; }
  94%  { opacity:.18; }
  100% { opacity:0;   transform:translateY(108vh)  rotate(420deg) translateX(55px); }
}

/* \u2500\u2500 FIREFLIES \u2500\u2500 */
#fireflies { position:fixed; inset:0; pointer-events:none; z-index:9970; overflow:hidden; }
.ff {
  position:absolute; width:3px; height:3px; border-radius:50%;
  background:var(--gold2); animation:ffade ease-in-out infinite;
  box-shadow:0 0 4px 2px rgba(212,168,75,.5);
}
@keyframes ffade {
  0%,100% { opacity:0; transform:translate(0,0); }
  25%     { opacity:.85; }
  50%     { opacity:.4;  transform:translate(var(--dx,20px),var(--dy,-20px)); }
  75%     { opacity:.7; }
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 HERO \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.hero {
  min-height:100vh;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  text-align:center; position:relative; overflow:hidden; padding:80px 24px;
  background:#4A0D16;
}
.hero::before {
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(ellipse 80% 70% at 50% 45%, #8B1F30 0%, transparent 68%),
    linear-gradient(170deg,#3D0810 0%,#6B1520 45%,#3A0A10 100%);
  z-index:0;
}
.hero::after {
  content:''; position:absolute; inset:0; z-index:0;
  background:url("data:image/svg+xml,%3Csvg width='52' height='52' viewBox='0 0 52 52' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23C9943A' fill-opacity='0.035'%3E%3Cpath d='M26 0 L28 10 L26 8 L24 10 Z'/%3E%3Cpath d='M52 26 L42 28 L44 26 L42 24 Z'/%3E%3Cpath d='M26 52 L24 42 L26 44 L28 42 Z'/%3E%3Cpath d='M0 26 L10 24 L8 26 L10 28 Z'/%3E%3C/g%3E%3C/svg%3E");
  opacity:.6;
}

.hero-glow {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:520px; height:520px; border-radius:50%; z-index:1; pointer-events:none;
  background:radial-gradient(circle,rgba(184,134,42,.13) 0%,transparent 70%);
  animation:gpulse 4s ease-in-out infinite;
}
@keyframes gpulse { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6;} 50%{transform:translate(-50%,-50%) scale(1.3);opacity:1;} }

.h-ring {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:min(92vw,680px); height:min(92vw,680px);
  opacity:.07; z-index:1; pointer-events:none;
  animation:rot 100s linear infinite;
}
@keyframes rot { to { transform:translate(-50%,-50%) rotate(360deg); } }

.crn { position:absolute; width:clamp(90px,20vw,220px); opacity:.22; z-index:2; pointer-events:none; }
.crn.tl{top:0;left:0;}
.crn.tr{top:0;right:0;transform:scaleX(-1);}
.crn.bl{bottom:0;left:0;transform:scaleY(-1);}
.crn.br{bottom:0;right:0;transform:scale(-1);}

.hero-diya {
  position:absolute; font-size:1.4rem; z-index:2; pointer-events:none;
  animation:diyabob ease-in-out infinite;
}
@keyframes diyabob { 0%,100%{transform:translateY(0) rotate(-5deg);} 50%{transform:translateY(-14px) rotate(5deg);} }

.h-content { position:relative; z-index:3; display:flex; flex-direction:column; align-items:center; }

.h-eyebrow {
  font-family:'Raleway',sans-serif;
  font-size:clamp(.6rem,1.8vw,.78rem); letter-spacing:6px; text-transform:uppercase;
  color:var(--gold2); margin-bottom:28px;
  animation:up 1.4s cubic-bezier(.22,1,.36,1) .15s both;
}
.h-band { display:flex; align-items:center; gap:18px; margin-bottom:14px; animation:up 1.4s cubic-bezier(.22,1,.36,1) .3s both; }
.h-line { width:clamp(35px,9vw,90px); height:1px; background:linear-gradient(to right,transparent,var(--gold)); }
.h-line.r { background:linear-gradient(to left,transparent,var(--gold)); }
.h-sym { color:var(--gold2); font-size:1.1rem; }

/* Names \u2014 letter by letter */
.h-names {
  font-family:'IM Fell English',serif;
  font-size:clamp(3.8rem,13vw,8.5rem);
  color:#fff; line-height:.88; letter-spacing:-1px;
  display:block; position:relative;
}
/* shimmer overlay \u2014 separate element so it doesn't break letter spans */
.name-shimmer {
  position:absolute; inset:0; pointer-events:none; z-index:1;
  background:linear-gradient(105deg,transparent 25%,rgba(255,220,80,.6) 50%,transparent 75%);
  background-size:300% 100%;
  -webkit-background-clip:text; background-clip:text;
  color:transparent;
  animation:shimmer 3.5s ease-in-out infinite 2.5s;
}
@keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

.h-names .letter {
  display:inline-block; opacity:0;
  animation:letterIn .55s cubic-bezier(.22,1,.36,1) both;
}
@keyframes letterIn { from{opacity:0;transform:translateY(22px) scale(.85);} to{opacity:1;transform:translateY(0) scale(1);} }

.h-weds {
  display:block; font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.3rem,4vw,2.4rem); color:var(--gold2);
  font-style:italic; font-weight:300; letter-spacing:10px; margin:10px 0 8px;
  animation:up 1.4s cubic-bezier(.22,1,.36,1) .55s both;
}
.h-date {
  margin-top:30px; font-family:'Cormorant Garamond',serif;
  font-size:clamp(.88rem,2.4vw,1.15rem); color:var(--blush);
  font-style:italic; letter-spacing:2px;
  animation:up 1.4s cubic-bezier(.22,1,.36,1) .75s both;
}

/* countdown */
.h-cd { margin-top:34px; display:flex; gap:clamp(8px,2.5vw,20px); animation:up 1.4s cubic-bezier(.22,1,.36,1) .92s both; }
.cd-cell { display:flex; flex-direction:column; align-items:center; gap:5px; }
.cd-n {
  font-family:'IM Fell English',serif; font-size:clamp(1.7rem,4.5vw,2.6rem); color:var(--gold2);
  width:clamp(54px,11vw,70px); height:clamp(54px,11vw,70px);
  display:flex; align-items:center; justify-content:center;
  border:1px solid rgba(201,148,58,.3); border-radius:3px;
  background:rgba(0,0,0,.28); backdrop-filter:blur(4px);
}
.cd-l { font-family:'Raleway',sans-serif; font-size:.54rem; letter-spacing:3px; text-transform:uppercase; color:rgba(237,213,184,.45); }

.h-scroll {
  margin-top:50px; font-family:'Raleway',sans-serif;
  font-size:.56rem; letter-spacing:4px; text-transform:uppercase;
  color:rgba(201,148,58,.42);
  animation:up 1.4s ease 1.1s both, bob 2.4s ease 1.6s infinite;
}
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(8px)} }
@keyframes up  { from{opacity:0;transform:translateY(26px)} to{opacity:1;transform:translateY(0)} }

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 SHARED \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.sec { padding:clamp(64px,10vw,108px) clamp(20px,5vw,60px); }
.s-tag { text-align:center; font-family:'Raleway',sans-serif; font-size:.6rem; letter-spacing:5px; text-transform:uppercase; color:var(--gold); margin-bottom:10px; }
.s-title { font-family:'IM Fell English',serif; font-size:clamp(1.9rem,5.5vw,3rem); text-align:center; color:var(--maroon); font-style:italic; margin-bottom:6px; }
.s-sub { text-align:center; font-size:clamp(.9rem,2.5vw,1.05rem); color:var(--muted); font-style:italic; font-weight:300; margin-bottom:44px; }
.orn { display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:52px; }
.orn-l { flex:1; max-width:180px; height:1px; background:linear-gradient(to right,transparent,var(--gold)); }
.orn-l.r { background:linear-gradient(to left,transparent,var(--gold)); }
.orn-s { color:var(--gold); font-size:1.2rem; }
/* universal reveal */
.rev { opacity:0; transform:translateY(20px); transition:opacity .7s ease,transform .7s ease; }
.rev.vis { opacity:1; transform:translateY(0); }

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 STORY \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.story-sec { background:var(--cream); }
.story-inner {
  max-width:680px; margin:0 auto; text-align:center;
  background:#fff; border:1px solid rgba(184,134,42,.2); border-radius:3px;
  padding:clamp(32px,6vw,56px) clamp(24px,5vw,52px);
  box-shadow:0 4px 40px rgba(107,21,32,.06); position:relative; overflow:hidden;
}
.story-inner::before {
  content:'\u275d'; position:absolute; top:10px; left:18px;
  font-size:5rem; color:rgba(184,134,42,.1); font-family:'IM Fell English',serif; line-height:1; pointer-events:none;
}
.story-text { font-family:'Cormorant Garamond',serif; font-size:clamp(1.05rem,2.8vw,1.25rem); color:var(--ink); line-height:1.9; font-style:italic; font-weight:300; position:relative; z-index:1; }
.story-text strong { color:var(--maroon); font-style:normal; font-weight:600; }
.story-sig { margin-top:24px; font-family:'IM Fell English',serif; font-size:1.3rem; color:var(--gold); font-style:italic; }

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 EVENTS \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.ev-sec { background:var(--warm); position:relative; overflow:hidden; }
.ev-sec::before {
  content:''; position:absolute; top:-120px; right:-120px; width:400px; height:400px; border-radius:50%;
  background:radial-gradient(circle,rgba(184,134,42,.06) 0%,transparent 70%); pointer-events:none;
}
.ev-sec::after {
  content:''; position:absolute; bottom:-80px; left:-80px; width:300px; height:300px; border-radius:50%;
  background:radial-gradient(circle,rgba(107,21,32,.04) 0%,transparent 70%); pointer-events:none;
}

/* card grid \u2014 2 cols on desktop, 1 on mobile */
.ev-grid {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:24px;
  max-width:920px;
  margin:0 auto;
}
/* wedding card spans full width */
.ev-grid .ev.wedding-card {
  grid-column: 1 / -1;
  max-width:500px;
  margin:0 auto;
  width:100%;
}

/* each event is now a card */
.ev {
  background:#fff;
  border-radius:8px;
  border:1px solid rgba(184,134,42,.18);
  overflow:hidden;
  opacity:0; transform:translateY(22px);
  transition:opacity .6s ease, transform .6s ease, box-shadow .3s, border-color .3s;
  box-shadow:0 2px 16px rgba(107,21,32,.05);
}
.ev.vis { opacity:1; transform:translateY(0); }
.ev:hover { box-shadow:0 8px 32px rgba(107,21,32,.12); border-color:rgba(184,134,42,.4); }

/* coloured top stripe per ceremony */
.ev-stripe {
  height:4px;
  width:100%;
}

/* card top section */
.ev-head {
  padding:22px 24px 16px;
  display:flex;
  align-items:center;
  gap:16px;
  border-bottom:1px solid rgba(184,134,42,.1);
}
.ev-ico-wrap {
  width:52px; height:52px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:1.6rem; flex-shrink:0;
}
.ev-head-text { flex:1; }
.ev-name {
  font-family:'IM Fell English',serif;
  font-size:clamp(1.2rem,3vw,1.6rem);
  color:var(--maroon); font-style:italic;
  line-height:1.1; margin-bottom:4px;
}
.ev-date-tag {
  font-family:'Raleway',sans-serif;
  font-size:.6rem; letter-spacing:2.5px; text-transform:uppercase;
  color:var(--gold); font-weight:500;
}

/* card body */
.ev-bd { padding:16px 24px 20px; }
.ev-rows { display:flex; flex-direction:column; gap:8px; }
.ev-r {
  display:flex; gap:10px; align-items:center;
  font-size:clamp(.82rem,2vw,.92rem); color:var(--muted); font-weight:300;
}
.ev-r .i { flex-shrink:0; font-size:.9rem; width:18px; text-align:center; }
.swatch {
  display:inline-block; width:10px; height:10px; border-radius:50%;
  flex-shrink:0; border:1px solid rgba(0,0,0,.1); margin-right:2px;
}

/* card footer */
.ev-foot {
  padding:12px 24px 18px;
  display:flex; flex-wrap:wrap; align-items:center; gap:8px;
  border-top:1px solid rgba(184,134,42,.08);
}
.ev-pill {
  display:inline-flex; align-items:center;
  padding:5px 14px; border:1px solid rgba(184,134,42,.32); border-radius:20px;
  font-family:'Raleway',sans-serif; font-size:.58rem; letter-spacing:2px; text-transform:uppercase; color:var(--gold);
}
.ev-cal {
  display:inline-flex; align-items:center; gap:5px;
  padding:5px 12px; background:rgba(184,134,42,.08); border:1px solid rgba(184,134,42,.22); border-radius:20px;
  font-family:'Raleway',sans-serif; font-size:.56rem; letter-spacing:1.5px; text-transform:uppercase;
  color:var(--gold); text-decoration:none; transition:background .2s;
  white-space:nowrap;
}
.ev-cal:hover { background:rgba(184,134,42,.2); }
